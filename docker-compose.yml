services:
  postgres:
    image: postgres:17-alpine
    container_name: spinx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: spinx
      POSTGRES_PASSWORD: spinx
      POSTGRES_DB: spinx
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spinx -d spinx"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
